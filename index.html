<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA BODEGA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-size: 12px; line-height: 1.2; background-color: #f1f5f9; }
        #app, #login { display: none; }
        .scroll-custom::-webkit-scrollbar { width: 3px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login" class="min-h-screen flex items-center justify-center px-4 bg-indigo-900">
        <div class="bg-white p-8 rounded-[35px] shadow-2xl w-full max-w-sm text-center">
            <div class="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-store text-indigo-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-indigo-900 mb-2 italic">BIENVENIDO</h2>
            <p class="text-slate-400 text-[10px] uppercase font-bold mb-6">Ingrese su código autorizado</p>
            <input type="text" id="codigoAcceso" class="w-full p-4 bg-slate-100 rounded-2xl border-none text-center font-black text-xl text-indigo-700 outline-none mb-4 focus:ring-2 focus:ring-yellow-400" placeholder="0000">
            <button onclick="intentarAcceso()" id="btnEntrar" class="w-full bg-yellow-400 text-indigo-900 py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">Entrar al Sistema</button>
        </div>
    </div>

    <div id="app">
        <header class="bg-indigo-700 text-white p-2 pb-6 text-center rounded-b-[25px] shadow-md sticky top-0 z-50">
            <h1 id="headerNombre" class="text-sm font-black text-yellow-300 italic uppercase">BODEGA</h1>
            <button onclick="cerrarSesion()" class="absolute top-2 right-3 bg-red-500 w-6 h-6 rounded-full text-[10px] flex items-center justify-center border border-white/20 shadow-lg">✕</button>
        </header>

        <div class="max-w-md mx-auto -mt-4 px-2 relative z-10">
            <div id="seccionReportes" class="hidden bg-indigo-900 text-white p-3 rounded-2xl shadow-xl mb-2 border-b-2 border-yellow-400">
                <div class="flex justify-around text-center mb-2">
                    <div><p class="text-[7px] opacity-60">Bs Hoy</p><p id="reporteBs" class="font-black text-yellow-400 text-lg">0.00</p></div>
                    <div><p class="text-[7px] opacity-60">Ref $ Hoy</p><p id="reporteUSD" class="font-black text-yellow-400 text-lg">0.00</p></div>
                </div>
            </div>

            <div class="bg-white p-2 rounded-xl shadow-sm mb-2 flex items-center justify-between border border-slate-200">
                <div class="flex flex-col">
                    <span class="text-[7px] font-bold text-slate-400 uppercase">Tasa BCV</span>
                    <input type="number" id="tasaBCV" class="font-black text-indigo-800 text-xl outline-none w-20 bg-transparent" value="42.00">
                </div>
                <button onclick="actualizarTasa()" class="text-[8px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-md border border-indigo-100 uppercase">Fijar</button>
            </div>

            <details class="mb-2 bg-white rounded-xl shadow-sm border border-slate-100">
                <summary class="p-2 font-black text-[9px] text-indigo-600 uppercase italic cursor-pointer">▸ Inventario / Editar</summary>
                <div class="p-2 space-y-1.5">
                    <input type="hidden" id="editId">
                    <input type="text" id="nombreP" placeholder="Producto" class="w-full p-1.5 bg-slate-50 rounded-lg border text-xs outline-none uppercase">
                    <div class="flex gap-1.5">
                        <input type="number" id="precioP" placeholder="$" class="w-1/2 p-1.5 bg-slate-50 rounded-lg border text-xs font-bold text-green-600 outline-none">
                        <input type="number" id="stockP" placeholder="Stock" class="w-1/2 p-1.5 bg-slate-50 rounded-lg border text-xs outline-none">
                    </div>
                    <button onclick="agregarProducto()" class="w-full bg-indigo-600 text-white py-1.5 rounded-lg font-black uppercase text-[9px]">Guardar</button>
                </div>
            </details>

            <div id="lista" class="space-y-1.5"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 z-[100]">
            <div class="max-w-md mx-auto bg-white p-3 rounded-t-[25px] shadow-[0_-8px_20px_rgba(0,0,0,0.1)] border-t">
                <div id="itemsCarrito" class="max-h-16 overflow-y-auto mb-2 text-[9px] font-bold text-slate-500 scroll-custom border-b border-dashed pb-1">
                    <p id="carritoVacioMsg" class="text-center text-slate-300 py-1 italic">Carrito Vacío</p>
                </div>
                <div class="flex justify-between items-center px-1">
                    <div>
                        <p id="totalBs" class="text-xl font-black text-indigo-700 leading-none">0.00 Bs</p>
                        <p id="totalUSD" class="text-[9px] font-bold text-emerald-600">Ref: 0.00$</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="vaciarCarrito()" class="bg-slate-100 text-slate-400 p-2 rounded-xl text-[10px]"><i class="fas fa-trash"></i></button>
                        <button id="btnCobrar" onclick="procesarVenta()" class="bg-yellow-400 text-indigo-900 px-5 py-2 rounded-xl font-black uppercase text-[10px] shadow-md">Cobrar</button>
                    </div>
                </div>
            </div>
            <nav class="max-w-md mx-auto bg-white border-t p-1 flex justify-around items-center">
                <button onclick="verSeccion('inventario')" class="flex flex-col items-center py-1"><i class="fas fa-cash-register text-indigo-700 text-sm"></i><span class="text-[7px] font-black uppercase text-indigo-700">Ventas</span></button>
                <button onclick="verSeccion('reportes')" id="btnReporte" class="flex flex-col items-center py-1 opacity-30"><i class="fas fa-file-invoice-dollar text-slate-600 text-sm"></i><span class="text-[7px] font-black uppercase text-slate-600">Reporte</span></button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, query, where, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrVNTiKB8ou8RLFhYyku_WcljhxYNZAtQ",
            authDomain: "la-bodega-de-checopete.firebaseapp.com",
            projectId: "la-bodega-de-checopete",
            storageBucket: "la-bodega-de-checopete.firebasestorage.app",
            messagingSenderId: "103184923666",
            appId: "1:103184923666:web:d38b3be10cb85f73a9accb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let ID = localStorage.getItem('idBodega');
        let carrito = [];
        const hoy = new Date().toLocaleDateString();

        // CONTROL DE PANTALLAS
        if (!ID) {
            document.getElementById('login').style.display = 'flex';
        } else {
            iniciarSistema();
        }

        window.intentarAcceso = async () => {
            const code = document.getElementById('codigoAcceso').value.toUpperCase().trim();
            if(!code) return;
            const btn = document.getElementById('btnEntrar');
            btn.disabled = true; btn.innerText = "Validando...";
            
            const docSnap = await getDoc(doc(db, "autorizados", code));
            if (docSnap.exists()) {
                localStorage.setItem('idBodega', code);
                location.reload();
            } else {
                alert("❌ CÓDIGO NO AUTORIZADO");
                btn.disabled = false; btn.innerText = "Entrar al Sistema";
            }
        };

        function iniciarSistema() {
            document.getElementById('app').style.display = 'block';
            document.getElementById('headerNombre').innerText = "BODEGA: " + ID;

            onSnapshot(doc(db, "ajustes", ID), (d) => { if(d.exists()) { document.getElementById('tasaBCV').value = d.data().tasa; renderizar(); } });
            onSnapshot(query(collection(db, "productos"), where("idBodega", "==", ID)), (snap) => { window.datosP = snap; renderizar(); });
            onSnapshot(query(collection(db, "ventas"), where("idBodega", "==", ID), where("fechaStr", "==", hoy)), (snap) => {
                let tBs = 0, tU = 0; snap.forEach(v => { tBs += v.data().totalBs; tU += v.data().totalUSD; });
                document.getElementById('reporteBs').innerText = tBs.toFixed(2);
                document.getElementById('reporteUSD').innerText = tU.toFixed(2);
            });
        }

        function renderizar() {
            const lista = document.getElementById('lista');
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 1;
            if(!window.datosP) return;
            lista.innerHTML = "";
            window.datosP.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                lista.innerHTML += `
                    <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-50 flex justify-between items-center active:bg-slate-50" onclick="agregarAlCarrito('${id}', '${p.nombre}', ${p.precioUSD})">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-black text-[10px] uppercase text-indigo-900 truncate">${p.nombre}</h3>
                            <span class="text-sm font-black text-slate-800">${(p.precioUSD * tasa).toFixed(2)} Bs</span>
                        </div>
                        <button onclick="event.stopPropagation(); prepararEdicion('${id}', '${p.nombre}', ${p.precioUSD})" class="text-indigo-400 bg-indigo-50 w-6 h-6 rounded flex items-center justify-center ml-2"><i class="fas fa-edit text-[8px]"></i></button>
                    </div>`;
            });
        }

        window.agregarAlCarrito = (id, nombre, precio) => {
            carrito.push({id, nombre, precio});
            actualizarCarritoUI();
        };

        function actualizarCarritoUI() {
            const list = document.getElementById('itemsCarrito');
            const msg = document.getElementById('carritoVacioMsg');
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 1;
            list.innerHTML = "";
            if(carrito.length === 0) { msg.classList.remove('hidden'); list.appendChild(msg); } 
            else { msg.classList.add('hidden'); }
            
            let tU = 0;
            carrito.forEach((item, index) => {
                tU += item.precio;
                list.innerHTML += `<div class="flex justify-between py-0.5 border-b border-slate-50"><span>• ${item.nombre}</span> <span>$${item.precio}</span></div>`;
            });
            document.getElementById('totalUSD').innerText = "Ref: " + tU.toFixed(2) + "$";
            document.getElementById('totalBs').innerText = (tU * tasa).toFixed(2) + " Bs";
        }

        window.vaciarCarrito = () => { carrito = []; actualizarCarritoUI(); };

        window.procesarVenta = async () => {
            if(carrito.length === 0) return;
            const btn = document.getElementById('btnCobrar');
            btn.disabled = true; btn.innerText = "...";
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 1;
            let tU = carrito.reduce((acc, item) => acc + item.precio, 0);
            
            await addDoc(collection(db, "ventas"), { idBodega: ID, totalUSD: tU, totalBs: tU * tasa, fecha: serverTimestamp(), fechaStr: hoy });
            btn.disabled = false; btn.innerText = "Cobrar";
            vaciarCarrito();
            alert("✅ Venta Guardada");
        };

        window.actualizarTasa = async () => { await setDoc(doc(db, "ajustes", ID), { tasa: parseFloat(document.getElementById('tasaBCV').value) }, {merge:true}); alert("OK"); };
        window.cerrarSesion = () => { if(confirm("¿SALIR?")){ localStorage.clear(); location.reload(); } };
        window.verSeccion = (sec) => {
            const esRep = sec === 'reportes';
            document.getElementById('seccionReportes').classList.toggle('hidden', !esRep);
            document.getElementById('btnReporte').classList.toggle('opacity-100', esRep);
        };
        window.agregarProducto = async () => {
            const n = document.getElementById('nombreP').value.toUpperCase(), p = parseFloat(document.getElementById('precioP').value);
            if(n && p) {
                const id = document.getElementById('editId').value;
                if(id) await updateDoc(doc(db, "productos", id), { nombre: n, precioUSD: p });
                else await addDoc(collection(db, "productos"), { nombre: n, precioUSD: p, idBodega: ID });
                document.getElementById('nombreP').value = ""; document.getElementById('precioP').value = ""; document.getElementById('editId').value = "";
                alert("Guardado");
            }
        };
        window.prepararEdicion = (id, n, p) => { document.querySelector('details').open = true; document.getElementById('editId').value = id; document.getElementById('nombreP').value = n; document.getElementById('precioP').value = p; };
    </script>
</body>
                </html>
