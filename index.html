<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA BODEGA - AUTORIZADOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #contenidoPrincipal { display: none; }
        body { background-color: #f1f5f9; }
    </style>
</head>
<body>

    <div id="contenidoPrincipal">
        <header class="bg-indigo-700 text-white p-6 pb-12 text-center rounded-b-[40px] shadow-lg sticky top-0 z-50">
            <h1 id="headerNombre" class="text-xl font-black text-yellow-300 italic uppercase italic">BODEGA</h1>
            <button onclick="cerrarSesion()" class="absolute top-4 right-5 bg-red-500 text-white w-8 h-8 rounded-full font-black flex items-center justify-center border-2 border-white">✕</button>
        </header>

        <div class="max-w-md mx-auto -mt-8 px-4 relative z-10">
            <div class="bg-white p-5 rounded-3xl shadow-md mb-4 border flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Tasa del Día</p>
                    <input type="number" id="tasaBCV" class="bg-transparent font-black text-indigo-800 text-3xl outline-none w-28" value="42.00">
                </div>
                <button onclick="actualizarTasa()" class="bg-indigo-100 text-indigo-700 px-5 py-2 rounded-2xl font-black uppercase text-xs">Fijar</button>
            </div>
            <div id="lista" class="space-y-3"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 z-[100] bg-white border-t p-4">
            <div class="max-w-md mx-auto">
                <div id="itemsCarrito" class="max-h-20 overflow-y-auto mb-3 text-xs font-bold text-slate-500">
                    <p id="msgVacio" class="text-center text-slate-300">Carrito vacío</p>
                </div>
                <div class="flex justify-between items-center">
                    <div>
                        <p id="totalBs" class="text-3xl font-black text-indigo-700 leading-none">0.00 Bs</p>
                        <p id="totalUSD" class="text-xs font-bold text-emerald-600">Ref: 0.00$</p>
                    </div>
                    <button onclick="procesarVenta()" class="bg-yellow-400 text-indigo-900 px-10 py-4 rounded-2xl font-black uppercase shadow-lg">Cobrar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, query, where, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrVNTiKB8ou8RLFhYyku_WcljhxYNZAtQ",
            authDomain: "la-bodega-de-checopete.firebaseapp.com",
            projectId: "la-bodega-de-checopete",
            storageBucket: "la-bodega-de-checopete.firebasestorage.app",
            messagingSenderId: "103184923666",
            appId: "1:103184923666:web:d38b3be10cb85f73a9accb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function validarAcceso() {
            let ID = localStorage.getItem('idBodega');
            if (!ID) {
                ID = prompt("CÓDIGO DE ACCESO:");
                if (!ID) { location.reload(); return; }
                ID = ID.toUpperCase().trim();

                const docRef = doc(db, "autorizados", ID); // <--- BUSCA EN AUTORIZADOS
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    localStorage.setItem('idBodega', ID);
                    location.reload();
                } else {
                    alert("⚠️ NO AUTORIZADO");
                    location.reload();
                }
            } else {
                mostrarApp(ID);
            }
        }

        validarAcceso();

        function mostrarApp(ID) {
            document.getElementById('contenidoPrincipal').style.display = 'block';
            document.getElementById('headerNombre').innerText = "BODEGA: " + ID;
            
            let carrito = [];
            onSnapshot(doc(db, "ajustes", ID), (d) => { if(d.exists()) document.getElementById('tasaBCV').value = d.data().tasa; });
            onSnapshot(query(collection(db, "productos"), where("idBodega", "==", ID)), (snap) => {
                const lista = document.getElementById('lista');
                lista.innerHTML = "";
                const tasa = parseFloat(document.getElementById('tasaBCV').value) || 1;
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    lista.innerHTML += `<div class="bg-white p-4 rounded-3xl shadow-sm border mb-2" onclick="agregarAlCarrito('${p.nombre}', ${p.precioUSD})">
                        <h3 class="font-black text-xs uppercase">${p.nombre}</h3>
                        <span class="text-2xl font-black">${(p.precioUSD * tasa).toFixed(2)} Bs</span>
                    </div>`;
                });
            });

            window.agregarAlCarrito = (nombre, precio) => {
                carrito.push({nombre, precio});
                const list = document.getElementById('itemsCarrito');
                const tasa = parseFloat(document.getElementById('tasaBCV').value);
                document.getElementById('msgVacio').classList.toggle('hidden', carrito.length > 0);
                list.innerHTML = ""; let tU = 0;
                carrito.forEach(i => { tU += i.precio; list.innerHTML += `<p>• ${i.nombre}</p>`; });
                document.getElementById('totalUSD').innerText = "Ref: " + tU.toFixed(2) + "$";
                document.getElementById('totalBs').innerText = (tU * tasa).toFixed(2) + " Bs";
            };

            window.procesarVenta = async () => {
                if(carrito.length === 0) return;
                const tU = carrito.reduce((acc, i) => acc + i.precio, 0);
                const tasa = parseFloat(document.getElementById('tasaBCV').value);
                await addDoc(collection(db, "ventas"), { idBodega: ID, totalUSD: tU, totalBs: tU * tasa, fecha: serverTimestamp(), fechaStr: new Date().toLocaleDateString() });
                carrito = []; location.reload();
            };

            window.cerrarSesion = () => { localStorage.removeItem('idBodega'); location.reload(); };
            window.actualizarTasa = async () => { await setDoc(doc(db, "ajustes", ID), { tasa: parseFloat(document.getElementById('tasaBCV').value) }, {merge:true}); alert("OK"); };
        }
    </script>
</body>
    </html>
