<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA PRO SLIM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-size: 13px; }
        /* Scrollbar pequeña para el carrito */
        #itemsCarrito::-webkit-scrollbar { width: 4px; }
        #itemsCarrito::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 pb-64">

    <header class="bg-indigo-700 text-white p-3 pb-8 text-center rounded-b-[30px] shadow-lg relative sticky top-0 z-50">
        <h1 id="headerNombre" class="text-base font-black text-yellow-300 italic uppercase">BODEGA: CHECOPETE01</h1>
        <button onclick="cerrarSesion()" class="absolute top-2 right-3 bg-red-500 text-white w-7 h-7 rounded-full font-black flex items-center justify-center text-[10px] shadow-md border border-white/20">✕</button>
    </header>

    <div class="max-w-md mx-auto -mt-5 px-3 relative z-10">
        
        <div id="seccionReportes" class="hidden bg-indigo-900 text-white p-3 rounded-2xl shadow-xl mb-3 border-b-4 border-yellow-400">
            <div class="grid grid-cols-2 gap-2 text-center mb-3">
                <div class="bg-white/10 p-1.5 rounded-lg">
                    <p class="text-[7px] uppercase opacity-60">Total Bs</p>
                    <p id="reporteBs" class="text-base font-black text-yellow-400">0.00</p>
                </div>
                <div class="bg-white/10 p-1.5 rounded-lg">
                    <p class="text-[7px] uppercase opacity-60">Total $</p>
                    <p id="reporteUSD" class="text-base font-black text-yellow-400">0.00</p>
                </div>
            </div>
            <button onclick="enviarReporteWhatsApp()" class="w-full bg-emerald-500 text-white p-2 rounded-xl font-black uppercase text-[9px] flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-sm"></i> WhatsApp
            </button>
        </div>

        <div class="bg-white p-3 rounded-2xl shadow-sm mb-3 border border-slate-200 flex items-center justify-between">
            <div class="text-left">
                <p class="text-[8px] font-black text-slate-400 uppercase italic">Tasa del Día</p>
                <input type="number" id="tasaBCV" class="bg-transparent font-black text-indigo-800 text-2xl outline-none w-24" value="42.00">
            </div>
            <button onclick="actualizarTasa()" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase border border-indigo-100">Fijar ✅</button>
        </div>

        <details class="mb-3 bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <summary class="p-2 font-black text-[9px] text-indigo-600 uppercase bg-slate-50 italic cursor-pointer">▸ Inventario (+)</summary>
            <div class="p-3 space-y-2">
                <input type="hidden" id="editId">
                <input type="text" id="nombreP" placeholder="Producto" class="w-full p-2 bg-slate-50 rounded-lg text-xs border outline-none">
                <div class="flex gap-2">
                    <input type="number" id="precioP" placeholder="Precio $" class="w-1/2 p-2 bg-slate-50 rounded-lg text-xs border font-bold text-green-600 outline-none">
                    <input type="number" id="stockP" placeholder="Stock" class="w-1/2 p-2 bg-slate-50 rounded-lg text-xs border font-bold outline-none">
                </div>
                <button id="btnGuardar" onclick="agregarProducto()" class="w-full bg-indigo-600 text-white p-2 rounded-lg font-black uppercase text-[10px] shadow-md">Guardar</button>
            </div>
        </details>

        <div id="lista" class="space-y-2"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-[100]">
        
        <div id="carritoUI" class="max-w-md mx-auto bg-white p-3 pt-4 rounded-t-[25px] shadow-[0_-10px_30px_rgba(0,0,0,0.15)] border-t border-slate-100">
            <div class="flex justify-between items-center mb-2 px-1">
                <h3 class="font-black text-indigo-900 uppercase text-[8px] italic">Cuenta actual</h3>
                <button onclick="vaciarCarrito()" class="text-[8px] text-red-500 font-black bg-red-50 px-2 py-0.5 rounded-full">BORRAR ✕</button>
            </div>

            <div id="itemsCarrito" class="max-h-20 overflow-y-auto mb-2 text-[10px] font-bold text-slate-500 space-y-1 min-h-[30px] px-1">
                <p class="text-slate-300 italic font-normal text-center py-1" id="carritoVacioMsg">Vacío</p>
            </div>

            <div class="flex justify-between items-center px-1">
                <div class="leading-none">
                    <p id="totalBs" class="text-2xl font-black text-indigo-700 tracking-tight">0.00 Bs</p>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span id="totalUSD" class="text-[10px] font-bold text-emerald-600">Ref: 0.00$</span>
                        <span id="cantItems" class="text-[9px] font-black text-indigo-400 uppercase">0 Items</span>
                    </div>
                </div>
                <button onclick="procesarVenta()" class="bg-yellow-400 text-indigo-900 px-6 py-3 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-all">Cobrar</button>
            </div>
        </div>

        <nav class="max-w-md mx-auto bg-white border-t border-slate-100 p-1.5 flex justify-around items-center shadow-2xl">
            <button onclick="verSeccion('inventario')" class="flex flex-col items-center gap-0.5">
                <div id="iconVenta" class="bg-indigo-700 text-white p-1.5 rounded-lg w-12 h-8 flex items-center justify-center shadow-md">
                    <i class="fas fa-cash-register text-xs"></i>
                </div>
                <span class="text-[8px] font-black uppercase text-indigo-700">Ventas</span>
            </button>
            <button onclick="verSeccion('reportes')" id="btnReporte" class="flex flex-col items-center gap-0.5 opacity-30">
                <div class="bg-slate-200 text-slate-600 p-1.5 rounded-lg w-12 h-8 flex items-center justify-center">
                    <i class="fas fa-file-invoice-dollar text-xs"></i>
                </div>
                <span class="text-[8px] font-black uppercase text-slate-600">Reporte</span>
            </button>
        </nav>
    </div>

    <script type="module">
        // Lógica de Firebase y funciones (Mantenidas intactas según tu solicitud anterior)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, updateDoc, query, where, getDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrVNTiKB8ou8RLFhYyku_WcljhxYNZAtQ",
            authDomain: "la-bodega-de-checopete.firebaseapp.com",
            projectId: "la-bodega-de-checopete",
            storageBucket: "la-bodega-de-checopete.firebasestorage.app",
            messagingSenderId: "103184923666",
            appId: "1:103184923666:web:d38b3be10cb85f73a9accb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ID = localStorage.getItem('idBodega') || "CHECOPETE01";
        let carrito = [];

        onSnapshot(doc(db, "ajustes", ID), (d) => { if(d.exists()) { document.getElementById('tasaBCV').value = d.data().tasa; renderizar(); } });
        onSnapshot(query(collection(db, "productos"), where("idBodega", "==", ID)), (snap) => { window.datosP = snap; renderizar(); });
        
        const hoy = new Date().toLocaleDateString();
        onSnapshot(query(collection(db, "ventas"), where("idBodega", "==", ID), where("fechaStr", "==", hoy)), (snap) => {
            let tBs = 0, tU = 0; snap.forEach(v => { tBs += v.data().totalBs; tU += v.data().totalUSD; });
            document.getElementById('reporteBs').innerText = tBs.toFixed(2);
            document.getElementById('reporteUSD').innerText = tU.toFixed(2);
        });

        function renderizar() {
            const lista = document.getElementById('lista');
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 0;
            if(!window.datosP) return;
            lista.innerHTML = "";
            window.datosP.forEach(docSnap => {
                const p = docSnap.data();
                const id = docSnap.id;
                lista.innerHTML += `
                    <div class="bg-white p-3 rounded-[22px] shadow-sm border border-slate-50 flex justify-between items-center active:scale-95 transition-all" onclick="agregarAlCarrito('${id}', '${p.nombre}', ${p.precioUSD})">
                        <div class="flex-1">
                            <h3 class="font-black text-[10px] uppercase text-indigo-900 leading-tight">${p.nombre}</h3>
                            <p class="text-[8px] font-bold text-emerald-600">Ref: ${p.precioUSD}$</p>
                            <span class="text-lg font-black text-slate-800 tracking-tighter">${(p.precioUSD * tasa).toFixed(2)} Bs</span>
                        </div>
                        <button onclick="event.stopPropagation(); prepararEdicion('${id}', '${p.nombre}', ${p.precioUSD}, ${p.stock})" class="text-indigo-400 bg-indigo-50 w-7 h-7 rounded-lg flex items-center justify-center"><i class="fas fa-edit text-[10px]"></i></button>
                    </div>`;
            });
        }

        window.agregarAlCarrito = (id, nombre, precio) => {
            carrito.push({id, nombre, precio});
            actualizarCarritoUI();
        };

        function actualizarCarritoUI() {
            const list = document.getElementById('itemsCarrito');
            const msg = document.getElementById('carritoVacioMsg');
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 0;
            if(carrito.length > 0) msg.classList.add('hidden'); else msg.classList.remove('hidden');
            list.innerHTML = ""; 
            if(carrito.length === 0) list.appendChild(msg);
            let tU = 0;
            carrito.forEach(i => { tU += i.precio; list.innerHTML += `<div class="flex justify-between border-b border-slate-50 py-0.5 italic"><span>• ${i.nombre}</span> <span>$${i.precio}</span></div>`; });
            document.getElementById('totalUSD').innerText = "Ref: " + tU.toFixed(2) + "$";
            document.getElementById('totalBs').innerText = (tU * tasa).toFixed(2) + " Bs";
            document.getElementById('cantItems').innerText = carrito.length + " Items";
            list.scrollTop = list.scrollHeight;
        }

        window.vaciarCarrito = () => { carrito = []; actualizarCarritoUI(); };

        window.procesarVenta = async () => {
            if(carrito.length === 0) return;
            const tasa = parseFloat(document.getElementById('tasaBCV').value) || 0;
            let tU = 0; carrito.forEach(i => tU += i.precio);
            await addDoc(collection(db, "ventas"), { idBodega: ID, totalUSD: tU, totalBs: tU * tasa, fecha: serverTimestamp(), fechaStr: new Date().toLocaleDateString() });
            vaciarCarrito();
            alert("Venta OK ✅");
        };

        window.enviarReporteWhatsApp = () => {
            const bs = document.getElementById('reporteBs').innerText;
            const usd = document.getElementById('reporteUSD').innerText;
            const msg = encodeURIComponent(`📊 REPORTE ${ID}\nTotal Bs: ${bs}\nTotal $: ${usd}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        };

        window.verSeccion = (sec) => {
            const esRep = sec === 'reportes';
            document.getElementById('seccionReportes').classList.toggle('hidden', !esRep);
            document.getElementById('btnReporte').classList.toggle('opacity-100', esRep);
            document.getElementById('btnReporte').classList.toggle('opacity-30', !esRep);
            document.getElementById('iconVenta').parentElement.classList.toggle('opacity-30', esRep);
            document.getElementById('iconVenta').parentElement.classList.toggle('opacity-100', !esRep);
        };

        window.agregarProducto = async () => {
            const n = document.getElementById('nombreP').value, p = parseFloat(document.getElementById('precioP').value), s = parseInt(document.getElementById('stockP').value);
            if(n) {
                const id = document.getElementById('editId').value;
                if(id) await updateDoc(doc(db, "productos", id), { nombre: n, precioUSD: p, stock: s });
                else await addDoc(collection(db, "productos"), { nombre: n, precioUSD: p, stock: s || 0, idBodega: ID });
                document.getElementById('nombreP').value = ""; document.getElementById('precioP').value = ""; document.getElementById('stockP').value = ""; document.getElementById('editId').value = "";
                alert("Guardado ✅");
            }
        };

        window.prepararEdicion = (id, nombre, precio, stock) => {
            document.querySelector('details').open = true;
            document.getElementById('editId').value = id;
            document.getElementById('nombreP').value = nombre;
            document.getElementById('precioP').value = precio;
            document.getElementById('stockP').value = stock;
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.actualizarTasa = async () => {
            await setDoc(doc(db, "ajustes", ID), { tasa: parseFloat(document.getElementById('tasaBCV').value) });
            alert("Tasa fijada");
        };

        window.cerrarSesion = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
    </html>
