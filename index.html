<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA BODEGA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 pb-64">

    <header class="bg-indigo-700 text-white p-6 pb-12 text-center rounded-b-[40px] shadow-lg relative sticky top-0 z-50">
        <h1 id="headerNombre" class="text-xl font-black text-yellow-300 italic uppercase">BODEGA</h1>
        <button onclick="cerrarSesion()" class="absolute top-4 right-5 bg-red-500 text-white w-8 h-8 rounded-full font-black flex items-center justify-center shadow-md border-2 border-white">✕</button>
    </header>

    <div class="max-w-md mx-auto -mt-8 px-4 relative z-10">
        <div class="bg-white p-5 rounded-3xl shadow-md mb-4 border border-slate-200 flex items-center justify-between">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase">Tasa del Día</p>
                <input type="number" id="tasaBCV" class="bg-transparent font-black text-indigo-800 text-3xl outline-none w-28" value="42.00">
            </div>
            <button onclick="actualizarTasa()" class="bg-indigo-100 text-indigo-700 px-5 py-2 rounded-2xl font-black uppercase text-xs">Fijar</button>
        </div>

        <div id="seccionReportes" class="hidden bg-indigo-900 text-white p-5 rounded-3xl shadow-xl mb-4 border-b-4 border-yellow-400">
            <div class="grid grid-cols-2 gap-4 text-center mb-4">
                <div><p class="text-[10px] uppercase opacity-60">Total Bs</p><p id="reporteBs" class="text-xl font-black text-yellow-400">0.00</p></div>
                <div><p class="text-[10px] uppercase opacity-60">Total $</p><p id="reporteUSD" class="text-xl font-black text-yellow-400">0.00</p></div>
            </div>
            <button onclick="enviarReporte()" class="w-full bg-emerald-500 text-white p-3 rounded-2xl font-black uppercase text-sm flex items-center justify-center gap-2 shadow-lg">
                <i class="fab fa-whatsapp text-xl"></i> Enviar Reporte
            </button>
        </div>

        <div id="lista" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-[100] bg-white border-t shadow-[0_-10px_30px_rgba(0,0,0,0.1)]">
        <div class="p-4 max-w-md mx-auto">
            <div id="itemsCarrito" class="max-h-20 overflow-y-auto mb-3 text-xs font-bold text-slate-500">
                <p id="msgVacio" class="text-center text-slate-300">Carrito vacío</p>
            </div>
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p id="totalBs" class="text-3xl font-black text-indigo-700 leading-none">0.00 Bs</p>
                    <p id="totalUSD" class="text-xs font-bold text-emerald-600">Ref: 0.00$</p>
                </div>
                <button onclick="procesarVenta()" class="bg-yellow-400 text-indigo-900 px-10 py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95">Cobrar</button>
            </div>
            <nav class="flex justify-around border-t pt-2">
                <button onclick="verVentana('ventas')" class="flex flex-col items-center gap-1">
                    <i class="fas fa-cash-register text-indigo-700 text-xl"></i>
                    <span class="text-[10px] font-black uppercase text-indigo-700">Ventas</span>
                </button>
                <button onclick="verVentana('reporte')" class="flex flex-col items-center gap-1 opacity-40">
                    <i class="fas fa-file-invoice-dollar text-slate-600 text-xl"></i>
                    <span class="text-[10px] font-black uppercase text-slate-600">Reporte</span>
                </button>
            </nav>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrVNTiKB8ou8RLFhYyku_WcljhxYNZAtQ",
            authDomain: "la-bodega-de-checopete.firebaseapp.com",
            projectId: "la-bodega-de-checopete",
            storageBucket: "la-bodega-de-checopete.firebasestorage.app",
            messagingSenderId: "103184923666",
            appId: "1:103184923666:web:d38b3be10cb85f73a9accb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let ID = localStorage.getItem('idBodega');
        if(!ID){
            ID = prompt("NOMBRE DE LA BODEGA:");
            if(ID) { localStorage.setItem('idBodega', ID.toUpperCase()); location.reload(); }
            else { ID = "CHECOPETE01"; }
        }
        document.getElementById('headerNombre').innerText = "BODEGA: " + ID;

        let carrito = [];
        const hoy = new Date().toLocaleDateString();

        onSnapshot(doc(db, "ajustes", ID), (d) => { if(d.exists()) document.getElementById('tasaBCV').value = d.data().tasa; });
        onSnapshot(query(collection(db, "productos"), where("idBodega", "==", ID)), (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            const tasa = parseFloat(document.getElementById('tasaBCV').value);
            snap.forEach(docSnap => {
                const p = docSnap.data();
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center" onclick="agregarAlCarrito('${p.nombre}', ${p.precioUSD})">
                        <div>
                            <h3 class="font-black text-xs uppercase text-indigo-900">${p.nombre}</h3>
                            <span class="text-2xl font-black text-slate-800">${(p.precioUSD * tasa).toFixed(2)} Bs</span>
                        </div>
                        <i class="fas fa-plus-circle text-indigo-200 text-xl"></i>
                    </div>`;
            });
        });

        onSnapshot(query(collection(db, "ventas"), where("idBodega", "==", ID), where("fechaStr", "==", hoy)), (snap) => {
            let tBs = 0, tU = 0; snap.forEach(v => { tBs += v.data().totalBs; tU += v.data().totalUSD; });
            document.getElementById('reporteBs').innerText = tBs.toFixed(2);
            document.getElementById('reporteUSD').innerText = tU.toFixed(2);
        });

        window.agregarAlCarrito = (nombre, precio) => {
            carrito.push({nombre, precio});
            actualizarCarrito();
        };

        function actualizarCarrito() {
            const list = document.getElementById('itemsCarrito');
            const tasa = parseFloat(document.getElementById('tasaBCV').value);
            document.getElementById('msgVacio').classList.toggle('hidden', carrito.length > 0);
            list.innerHTML = "";
            let tU = 0;
            carrito.forEach(i => { tU += i.precio; list.innerHTML += `<p>• ${i.nombre} ($${i.precio})</p>`; });
            document.getElementById('totalUSD').innerText = "Ref: " + tU.toFixed(2) + "$";
            document.getElementById('totalBs').innerText = (tU * tasa).toFixed(2) + " Bs";
        }

        window.procesarVenta = async () => {
            if(carrito.length === 0) return;
            const tU = carrito.reduce((acc, i) => acc + i.precio, 0);
            const tasa = parseFloat(document.getElementById('tasaBCV').value);
            await addDoc(collection(db, "ventas"), { idBodega: ID, totalUSD: tU, totalBs: tU * tasa, fecha: serverTimestamp(), fechaStr: hoy });
            carrito = []; actualizarCarrito();
            alert("Venta Realizada ✅");
        };

        window.cerrarSesion = () => { localStorage.removeItem('idBodega'); location.reload(); };
        window.actualizarTasa = async () => { await setDoc(doc(db, "ajustes", ID), { tasa: parseFloat(document.getElementById('tasaBCV').value) }); location.reload(); };
        window.verVentana = (v) => { document.getElementById('seccionReportes').classList.toggle('hidden', v !== 'reporte'); };
        window.enviarReporte = () => {
            const msj = `Reporte ${ID}: Bs ${document.getElementById('reporteBs').innerText} / USD ${document.getElementById('reporteUSD').innerText}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msj)}`);
        };
    </script>
</body>
</html>
